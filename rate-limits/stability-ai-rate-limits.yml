specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Stability AI
providerId: stability-ai
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - AI
description: Stability AI Developer Platform rate limits per API key.
sources:
  - https://platform.stability.ai/pricing
  - https://platform.stability.ai/docs/getting-started
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Default per-key
    scope: key
    metric: requests_per_10s
    limit: 150
    timeFrame: 10 seconds
  - name: Image generation queue
    scope: key
    metric: concurrent
    limit: 10
  - name: Video generation
    scope: key
    metric: concurrent_jobs
    limit: 5
