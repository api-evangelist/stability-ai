naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Edit API — Search and Replace
  description: 'Stability AI Stable Image Edit API — Search and Replace. 1 operations. Lead operation: Search and replace
    objects in an image. Self-contained Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Search and Replace
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-edit-search-and-replace
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Edit API — Search and Replace business capability. Self-contained, no shared references.
    resources:
    - name: v2beta-stable-image-edit-search-and-replace
      path: /v2beta/stable-image/edit/search-and-replace
      operations:
      - name: editimagesearchandreplace
        method: POST
        description: Search and replace objects in an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-edit-search-and-replace-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Edit API — Search and Replace. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/edit/search-and-replace
      name: v2beta-stable-image-edit-search-and-replace
      description: REST surface for v2beta-stable-image-edit-search-and-replace.
      operations:
      - method: POST
        name: editimagesearchandreplace
        description: Search and replace objects in an image
        call: stable-image-edit-search-and-replace.editimagesearchandreplace
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-edit-search-and-replace-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Edit API — Search and Replace. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: search-and-replace-objects-image
      description: Search and replace objects in an image
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: stable-image-edit-search-and-replace.editimagesearchandreplace
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
