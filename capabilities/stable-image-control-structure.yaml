naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Control API — Structure
  description: 'Stability AI Stable Image Control API — Structure. 1 operations. Lead operation: Generate an image guided
    by structural reference. Self-contained Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Structure
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-control-structure
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Control API — Structure business capability. Self-contained, no shared references.
    resources:
    - name: v2beta-stable-image-control-structure
      path: /v2beta/stable-image/control/structure
      operations:
      - name: controlimagestructure
        method: POST
        description: Generate an image guided by structural reference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-control-structure-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Control API — Structure. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/control/structure
      name: v2beta-stable-image-control-structure
      description: REST surface for v2beta-stable-image-control-structure.
      operations:
      - method: POST
        name: controlimagestructure
        description: Generate an image guided by structural reference
        call: stable-image-control-structure.controlimagestructure
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-control-structure-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Control API — Structure. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: generate-image-guided-structural-reference
      description: Generate an image guided by structural reference
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-control-structure.controlimagestructure
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
