naftiko: 1.0.0-alpha2
info:
  label: Stability AI Image Creation
  description: Unified workflow for AI-powered image creation using Stability AI's complete image generation and editing suite.
    Combines text-to-image generation across all model tiers (Ultra, Core, SD3) with image editing operations including inpainting,
    outpainting, background removal, and object replacement. Designed for creative professionals, marketing teams, and product
    designers who need programmatic control over image assets.
  tags:
  - Stability AI
  - Image Creation
  - Generative AI
  - Image Generation
  - Image Editing
  - Creative Workflow
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-generate
    baseUri: https://api.stability.ai
    description: Generate images from text prompts using Stable Diffusion models
    authentication:
      type: bearer
      token: '{{STABILITY_AI_API_KEY}}'
    resources:
    - name: generate-ultra
      path: /v2beta/stable-image/generate/ultra
      description: Generate using Stable Image Ultra - highest quality model
      operations:
      - name: generate-image-ultra
        method: POST
        description: Generate a high-quality image from a text prompt using Stable Image Ultra
        body:
          type: multipart
          data:
            prompt: '{{tools.prompt}}'
            negative_prompt: '{{tools.negative_prompt}}'
            aspect_ratio: '{{tools.aspect_ratio}}'
            seed: '{{tools.seed}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: generate-core
      path: /v2beta/stable-image/generate/core
      description: Generate using Stable Image Core - fast and affordable model
      operations:
      - name: generate-image-core
        method: POST
        description: Generate an image from a text prompt using Stable Image Core
        body:
          type: multipart
          data:
            prompt: '{{tools.prompt}}'
            negative_prompt: '{{tools.negative_prompt}}'
            aspect_ratio: '{{tools.aspect_ratio}}'
            seed: '{{tools.seed}}'
            output_format: '{{tools.output_format}}'
            style_preset: '{{tools.style_preset}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: generate-sd3
      path: /v2beta/stable-image/generate/sd3
      description: Generate using Stable Diffusion 3 and 3.5 models
      operations:
      - name: generate-image-sd3
        method: POST
        description: Generate an image using Stable Diffusion 3 or 3.5 with text-to-image or image-to-image
        body:
          type: multipart
          data:
            prompt: '{{tools.prompt}}'
            negative_prompt: '{{tools.negative_prompt}}'
            model: '{{tools.model}}'
            mode: '{{tools.mode}}'
            aspect_ratio: '{{tools.aspect_ratio}}'
            seed: '{{tools.seed}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: stable-image-edit
    baseUri: https://api.stability.ai
    description: Edit images using AI-powered inpainting, outpainting, erasing, and replacement
    authentication:
      type: bearer
      token: '{{STABILITY_AI_API_KEY}}'
    resources:
    - name: inpaint
      path: /v2beta/stable-image/edit/inpaint
      description: Fill masked regions of an image with AI-generated content
      operations:
      - name: edit-image-inpaint
        method: POST
        description: Inpaint a masked region of an image using a text prompt
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            mask: '{{tools.mask}}'
            prompt: '{{tools.prompt}}'
            negative_prompt: '{{tools.negative_prompt}}'
            seed: '{{tools.seed}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: outpaint
      path: /v2beta/stable-image/edit/outpaint
      description: Extend an image beyond its boundaries
      operations:
      - name: edit-image-outpaint
        method: POST
        description: Extend an image by generating new content beyond its borders
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            prompt: '{{tools.prompt}}'
            left: '{{tools.left}}'
            right: '{{tools.right}}'
            up: '{{tools.up}}'
            down: '{{tools.down}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: erase
      path: /v2beta/stable-image/edit/erase
      description: Remove objects from an image
      operations:
      - name: edit-image-erase
        method: POST
        description: Erase an object from an image by masking the area
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            mask: '{{tools.mask}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-and-replace
      path: /v2beta/stable-image/edit/search-and-replace
      description: Find and replace objects in an image
      operations:
      - name: edit-image-search-and-replace
        method: POST
        description: Find specific objects in an image and replace them using text descriptions
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            prompt: '{{tools.prompt}}'
            search_prompt: '{{tools.search_prompt}}'
            negative_prompt: '{{tools.negative_prompt}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search-and-recolor
      path: /v2beta/stable-image/edit/search-and-recolor
      description: Find and recolor objects in an image
      operations:
      - name: edit-image-search-and-recolor
        method: POST
        description: Find specific objects in an image and recolor them
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            prompt: '{{tools.prompt}}'
            select_prompt: '{{tools.select_prompt}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: remove-background
      path: /v2beta/stable-image/edit/remove-background
      description: Remove the background from an image
      operations:
      - name: edit-image-remove-background
        method: POST
        description: Automatically remove the background from an image
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: replace-background-and-relight
      path: /v2beta/stable-image/edit/replace-background-and-relight
      description: Replace background and adjust lighting in an image
      operations:
      - name: edit-image-replace-background-and-relight
        method: POST
        description: Replace the background of an image and adjust lighting to match
        body:
          type: multipart
          data:
            image: '{{tools.image}}'
            background_prompt: '{{tools.background_prompt}}'
            foreground_prompt: '{{tools.foreground_prompt}}'
            output_format: '{{tools.output_format}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: image-creation-api
    description: Unified REST API for Stability AI image creation and editing workflows.
    resources:
    - path: /v1/generate/ultra
      name: generate-ultra
      description: Generate images using Stable Image Ultra
      operations:
      - method: POST
        name: generate-image-ultra
        description: Generate a high-quality image from a text prompt using Stable Image Ultra
        call: stable-image-generate.generate-image-ultra
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/generate/core
      name: generate-core
      description: Generate images using Stable Image Core (fast)
      operations:
      - method: POST
        name: generate-image-core
        description: Generate an image from a text prompt using Stable Image Core
        call: stable-image-generate.generate-image-core
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/generate/sd3
      name: generate-sd3
      description: Generate images using Stable Diffusion 3 or 3.5
      operations:
      - method: POST
        name: generate-image-sd3
        description: Generate an image using Stable Diffusion 3 or 3.5 models
        call: stable-image-generate.generate-image-sd3
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/inpaint
      name: inpaint
      description: Fill masked regions with AI-generated content
      operations:
      - method: POST
        name: inpaint-image
        description: Inpaint a masked region of an image using a text prompt
        call: stable-image-edit.edit-image-inpaint
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/outpaint
      name: outpaint
      description: Extend an image beyond its boundaries
      operations:
      - method: POST
        name: outpaint-image
        description: Extend an image with new content in any direction
        call: stable-image-edit.edit-image-outpaint
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/erase
      name: erase
      description: Remove objects from images
      operations:
      - method: POST
        name: erase-from-image
        description: Erase an object from an image using a mask
        call: stable-image-edit.edit-image-erase
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/search-and-replace
      name: search-and-replace
      description: Find and replace objects in images
      operations:
      - method: POST
        name: search-and-replace
        description: Replace specific objects in an image using text descriptions
        call: stable-image-edit.edit-image-search-and-replace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/remove-background
      name: remove-background
      description: Remove image backgrounds
      operations:
      - method: POST
        name: remove-background
        description: Remove the background from an image automatically
        call: stable-image-edit.edit-image-remove-background
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edit/replace-background
      name: replace-background
      description: Replace background and adjust lighting
      operations:
      - method: POST
        name: replace-background-and-relight
        description: Replace the image background and adjust lighting conditions
        call: stable-image-edit.edit-image-replace-background-and-relight
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: image-creation-mcp
    transport: http
    description: MCP server for AI-assisted image creation and editing with Stability AI.
    tools:
    - name: generate-ultra-image
      description: Generate a photorealistic or artistic image from a text prompt using Stable Image Ultra (highest quality)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-generate.generate-image-ultra
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-core-image
      description: Generate an image from a text prompt using Stable Image Core (fast and affordable)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-generate.generate-image-core
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-sd3-image
      description: Generate an image using Stable Diffusion 3 or 3.5 (text-to-image or image-to-image)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-generate.generate-image-sd3
      outputParameters:
      - type: object
        mapping: $.
    - name: inpaint-image
      description: Fill a masked region of an image with AI-generated content guided by a text prompt
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-inpaint
      outputParameters:
      - type: object
        mapping: $.
    - name: outpaint-image
      description: Extend an image beyond its current edges by generating new content that continues the scene
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-outpaint
      outputParameters:
      - type: object
        mapping: $.
    - name: erase-from-image
      description: Remove a specific object or region from an image using a mask
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-erase
      outputParameters:
      - type: object
        mapping: $.
    - name: search-and-replace-in-image
      description: Find specific objects in an image by text description and replace them with new content
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-search-and-replace
      outputParameters:
      - type: object
        mapping: $.
    - name: search-and-recolor-in-image
      description: Find specific objects in an image and change their color using text descriptions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-search-and-recolor
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-image-background
      description: Automatically detect and remove the background from an image, isolating the foreground subject
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-remove-background
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-background-and-relight
      description: Replace an image's background with a new scene and adjust lighting to match
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit.edit-image-replace-background-and-relight
      outputParameters:
      - type: object
        mapping: $.
