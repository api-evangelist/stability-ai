naftiko: "1.0.0-alpha1"

info:
  label: "Stability AI Stable Image Generate"
  description: "Text-to-image generation API using Stable Diffusion 3.5, Stable Image Core, and Stable Image Ultra models."
  tags:
    - Stability AI
    - Image Generation
    - Generative AI
    - Text to Image
    - Stable Diffusion
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STABILITY_AI_API_KEY: STABILITY_AI_API_KEY

capability:
  consumes:
    - type: http
      namespace: stable-image-generate
      baseUri: https://api.stability.ai
      description: "Generate images from text prompts using Stable Diffusion models"
      authentication:
        type: bearer
        token: "{{STABILITY_AI_API_KEY}}"
      resources:
        - name: generate-ultra
          path: /v2beta/stable-image/generate/ultra
          description: "Generate using Stable Image Ultra - highest quality model"
          operations:
            - name: generate-image-ultra
              method: POST
              description: "Generate a high-quality image from a text prompt using Stable Image Ultra"
              body:
                type: multipart
                data:
                  prompt: "{{tools.prompt}}"
                  negative_prompt: "{{tools.negative_prompt}}"
                  aspect_ratio: "{{tools.aspect_ratio}}"
                  seed: "{{tools.seed}}"
                  output_format: "{{tools.output_format}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: generate-core
          path: /v2beta/stable-image/generate/core
          description: "Generate using Stable Image Core - fast and affordable model"
          operations:
            - name: generate-image-core
              method: POST
              description: "Generate an image from a text prompt using Stable Image Core"
              body:
                type: multipart
                data:
                  prompt: "{{tools.prompt}}"
                  negative_prompt: "{{tools.negative_prompt}}"
                  aspect_ratio: "{{tools.aspect_ratio}}"
                  seed: "{{tools.seed}}"
                  output_format: "{{tools.output_format}}"
                  style_preset: "{{tools.style_preset}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: generate-sd3
          path: /v2beta/stable-image/generate/sd3
          description: "Generate using Stable Diffusion 3 and 3.5 models"
          operations:
            - name: generate-image-sd3
              method: POST
              description: "Generate an image using Stable Diffusion 3 or 3.5 with text-to-image or image-to-image"
              body:
                type: multipart
                data:
                  prompt: "{{tools.prompt}}"
                  negative_prompt: "{{tools.negative_prompt}}"
                  model: "{{tools.model}}"
                  mode: "{{tools.mode}}"
                  aspect_ratio: "{{tools.aspect_ratio}}"
                  seed: "{{tools.seed}}"
                  output_format: "{{tools.output_format}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: stable-image-generate-api
      resources:
        - path: /v1/generate/ultra
          name: generate-ultra
          description: "Generate images using Stable Image Ultra"
          operations:
            - method: POST
              name: generate-image-ultra
              description: "Generate a high-quality image using Stable Image Ultra"
              call: "stable-image-generate.generate-image-ultra"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/generate/core
          name: generate-core
          description: "Generate images using Stable Image Core"
          operations:
            - method: POST
              name: generate-image-core
              description: "Generate an image using Stable Image Core"
              call: "stable-image-generate.generate-image-core"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/generate/sd3
          name: generate-sd3
          description: "Generate images using Stable Diffusion 3"
          operations:
            - method: POST
              name: generate-image-sd3
              description: "Generate an image using Stable Diffusion 3 or 3.5"
              call: "stable-image-generate.generate-image-sd3"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: stable-image-generate-mcp
      transport: http
      tools:
        - name: generate-image-ultra
          description: "Generate a high-quality image from a text prompt using Stability AI Stable Image Ultra"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "stable-image-generate.generate-image-ultra"
          outputParameters:
            - type: object
              mapping: "$."

        - name: generate-image-core
          description: "Generate an image from a text prompt using Stability AI Stable Image Core (fast)"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "stable-image-generate.generate-image-core"
          outputParameters:
            - type: object
              mapping: "$."

        - name: generate-image-sd3
          description: "Generate an image using Stable Diffusion 3 or 3.5 with text-to-image or image-to-image"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "stable-image-generate.generate-image-sd3"
          outputParameters:
            - type: object
              mapping: "$."
