naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Edit API — Erase
  description: 'Stability AI Stable Image Edit API — Erase. 1 operations. Lead operation: Erase an object from an image. Self-contained
    Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Erase
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-edit-erase
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Edit API — Erase business capability. Self-contained, no shared references.
    resources:
    - name: v2beta-stable-image-edit-erase
      path: /v2beta/stable-image/edit/erase
      operations:
      - name: editimageerase
        method: POST
        description: Erase an object from an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-edit-erase-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Edit API — Erase. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/edit/erase
      name: v2beta-stable-image-edit-erase
      description: REST surface for v2beta-stable-image-edit-erase.
      operations:
      - method: POST
        name: editimageerase
        description: Erase an object from an image
        call: stable-image-edit-erase.editimageerase
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-edit-erase-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Edit API — Erase. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: erase-object-image
      description: Erase an object from an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit-erase.editimageerase
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
