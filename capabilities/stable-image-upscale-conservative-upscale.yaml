naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Upscale API — Conservative Upscale
  description: 'Stability AI Stable Image Upscale API — Conservative Upscale. 1 operations. Lead operation: Conservative upscale
    an image. Self-contained Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Conservative Upscale
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-upscale-conservative-upscale
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Upscale API — Conservative Upscale business capability. Self-contained, no shared
      references.
    resources:
    - name: v2beta-stable-image-upscale-conservative
      path: /v2beta/stable-image/upscale/conservative
      operations:
      - name: upscaleimageconservative
        method: POST
        description: Conservative upscale an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-upscale-conservative-upscale-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Upscale API — Conservative Upscale. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/upscale/conservative
      name: v2beta-stable-image-upscale-conservative
      description: REST surface for v2beta-stable-image-upscale-conservative.
      operations:
      - method: POST
        name: upscaleimageconservative
        description: Conservative upscale an image
        call: stable-image-upscale-conservative-upscale.upscaleimageconservative
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-upscale-conservative-upscale-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Upscale API — Conservative Upscale. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: conservative-upscale-image
      description: Conservative upscale an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-upscale-conservative-upscale.upscaleimageconservative
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
