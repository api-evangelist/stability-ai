naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Generate API — Generate SD3
  description: 'Stability AI Stable Image Generate API — Generate SD3. 1 operations. Lead operation: Generate an image using
    Stable Diffusion 3. Self-contained Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Generate SD3
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-generate-generate-sd3
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Generate API — Generate SD3 business capability. Self-contained, no shared references.
    resources:
    - name: v2beta-stable-image-generate-sd3
      path: /v2beta/stable-image/generate/sd3
      operations:
      - name: generateimagesd3
        method: POST
        description: Generate an image using Stable Diffusion 3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-generate-generate-sd3-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Generate API — Generate SD3. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/generate/sd3
      name: v2beta-stable-image-generate-sd3
      description: REST surface for v2beta-stable-image-generate-sd3.
      operations:
      - method: POST
        name: generateimagesd3
        description: Generate an image using Stable Diffusion 3
        call: stable-image-generate-generate-sd3.generateimagesd3
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-generate-generate-sd3-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Generate API — Generate SD3. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: generate-image-using-stable-diffusion
      description: Generate an image using Stable Diffusion 3
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-generate-generate-sd3.generateimagesd3
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
