naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Edit API — Inpaint
  description: 'Stability AI Stable Image Edit API — Inpaint. 1 operations. Lead operation: Inpaint a masked region of an
    image. Self-contained Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Inpaint
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-edit-inpaint
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Edit API — Inpaint business capability. Self-contained, no shared references.
    resources:
    - name: v2beta-stable-image-edit-inpaint
      path: /v2beta/stable-image/edit/inpaint
      operations:
      - name: editimageinpaint
        method: POST
        description: Inpaint a masked region of an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-edit-inpaint-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Edit API — Inpaint. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/edit/inpaint
      name: v2beta-stable-image-edit-inpaint
      description: REST surface for v2beta-stable-image-edit-inpaint.
      operations:
      - method: POST
        name: editimageinpaint
        description: Inpaint a masked region of an image
        call: stable-image-edit-inpaint.editimageinpaint
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-edit-inpaint-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Edit API — Inpaint. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: inpaint-masked-region-image
      description: Inpaint a masked region of an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit-inpaint.editimageinpaint
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
