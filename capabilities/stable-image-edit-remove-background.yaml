naftiko: 1.0.0-alpha2
info:
  label: Stability AI Stable Image Edit API — Remove Background
  description: 'Stability AI Stable Image Edit API — Remove Background. 1 operations. Lead operation: Remove background from
    an image. Self-contained Naftiko capability covering one Stability Ai business surface.'
  tags:
  - Stability Ai
  - Remove Background
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STABILITY_AI_API_KEY: STABILITY_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: stable-image-edit-remove-background
    baseUri: https://api.stability.ai
    description: Stability AI Stable Image Edit API — Remove Background business capability. Self-contained, no shared references.
    resources:
    - name: v2beta-stable-image-edit-remove-background
      path: /v2beta/stable-image/edit/remove-background
      operations:
      - name: editimageremovebackground
        method: POST
        description: Remove background from an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STABILITY_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: stable-image-edit-remove-background-rest
    port: 8080
    description: REST adapter for Stability AI Stable Image Edit API — Remove Background. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2beta/stable-image/edit/remove-background
      name: v2beta-stable-image-edit-remove-background
      description: REST surface for v2beta-stable-image-edit-remove-background.
      operations:
      - method: POST
        name: editimageremovebackground
        description: Remove background from an image
        call: stable-image-edit-remove-background.editimageremovebackground
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stable-image-edit-remove-background-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stability AI Stable Image Edit API — Remove Background. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: remove-background-image
      description: Remove background from an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stable-image-edit-remove-background.editimageremovebackground
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
